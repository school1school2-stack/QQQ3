<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - اختبار تفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --royal-blue: #1e3a8a; --q-red: #ef4444; --bg-page: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 30px; box-sizing: border-box;
        }
        .header-right { text-align: right; } .header-left { text-align: left; }
        .user-name { margin: 0; color: var(--royal-blue); font-weight: 900; font-size: 1.5rem; }
        .school-name { margin: 0; color: #64748b; font-weight: 700; font-size: 1rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        .container { width: 100%; max-width: 850px; }
        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; overflow: hidden; }
        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }

        .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .q-number-badge { background: var(--royal-blue); color: white; padding: 2px 15px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; }
        .type-label { font-size: 0.85rem; font-weight: 900; color: #3b82f6; background: #eff6ff; padding: 4px 12px; border-radius: 20px; }
        .type-select { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; font-weight: 700; font-family: 'Cairo'; cursor: pointer; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: #000; font-weight: 700; line-height: 1.7; width: 100%; box-sizing: border-box; text-align: right; }
        .q-text-input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 8px; box-sizing: border-box; cursor: pointer; transition: 0.2s; }
        .opt-pair-row:hover { background: #f1f5f9; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: 900; color: #000; background: transparent; text-align: right; font-family: 'Cairo'; cursor: inherit; }

        .pair-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #fff1f2; padding: 15px; border-radius: 12px; border: 1.5px dashed #fca5a5; width: 100%; box-sizing: border-box; }
        .pair-word { width: 45%; text-align: center; border: none; background: white; padding: 10px; border-radius: 8px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; }

        .correct-ans-box { margin-top: 15px; padding: 10px; background: #f0fdf4; border-radius: 10px; border: 1px solid #bbf7d0; box-sizing: border-box; text-align: right; }
        .correct-input { width: 100%; background: transparent; border: none; outline: none; color: #166534; font-weight: 900; text-align: right; font-family: 'Cairo'; }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; gap: 8px; z-index: 1000; background: rgba(30, 41, 59, 0.95); padding: 12px 20px; border-radius: 50px; backdrop-filter: blur(10px); width: max-content; justify-content: center; }
        .btn { border: none; padding: 8px 15px; border-radius: 30px; font-weight: 800; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; transition: 0.3s; font-family: 'Cairo'; font-size: 0.85rem; }
        .btn-add { background: #3b82f6; } .btn-cloud-save { background: #a855f7; } .btn-cloud-load { background: #4f46e5; }
        .btn-cloud-delete { background: #f97316; } .btn-pdf { background: #ef4444; } .btn-img { background: #10b981; }
        .btn-link { background: #06b6d4; } .btn-check { background: #10b981; margin-top: 20px; padding: 15px 40px; font-size: 1.2rem; }

        /* وضع الطالب */
        body.student-mode .controls, 
        body.student-mode .remove-btn, 
        body.student-mode .type-select,
        body.student-mode .correct-ans-box { display: none !important; }
        body.student-mode .q-text-input, 
        body.student-mode .opt-word, 
        body.student-mode .pair-word, 
        body.student-mode .estieab-box { pointer-events: none; border: none; background: transparent !important; }
        body.student-mode .opt-pair-row { pointer-events: auto !important; }
        body.student-mode .selected-opt { background: #dbeafe !important; border: 2px solid #3b82f6 !important; }
        body.student-mode .pair-row { border: 1.5px solid #e2e8f0; background: #fff; }
    </style>
</head>
<body>

    <div class="user-header" id="main-header">
        <div class="header-right"><h2 class="user-name">أ. عبدالعزيز الفيفي</h2></div>
        <div class="header-center"><div class="logo-box"><i class="fas fa-award"></i></div></div>
        <div class="header-left"><p class="school-name">ثانوية الأمير عبدالمجيد 😉</p></div>
    </div>

    <div class="container" id="quiz-content"></div>

    <button id="student-check-btn" class="btn btn-check" style="display: none;" onclick="gradeExam()">
        <i class="fas fa-check-double"></i> تصحيح الاختبار ورؤية الدرجة
    </button>

    <div class="controls" id="admin-controls">
        <button class="btn btn-add" onclick="addQuestion()"><i class="fas fa-plus"></i> سؤال</button>
        <button class="btn btn-cloud-save" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i> حفظ</button>
        <button class="btn btn-cloud-load" onclick="loadFromCloud()"><i class="fas fa-cloud-download-alt"></i> فتح</button>
        <button class="btn btn-link" onclick="generateStudentLink()"><i class="fas fa-link"></i> رابط الطلاب</button>
        <button class="btn btn-cloud-delete" onclick="deleteFromCloud()"><i class="fas fa-trash-alt"></i> حذف</button>
        <button class="btn btn-pdf" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn btn-img" onclick="saveAsImages()"><i class="fas fa-image"></i> صور</button>
        <button class="btn" style="background:#64748b" onclick="clearAll()"><i class="fas fa-eraser"></i></button>
    </div>

    <script>
        const typeMap = { 'normal': 'إكمال جمل / خطأ سياقي', 'tanazor': 'تناظر لفظي ( : )', 'estieab': 'استيعاب المقروء', 'shaza': 'المفردة الشاذة', 'irtibat': 'الارتباط والاختلاف' };
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVrIim7aXjg0hGrMk0qVrXT8geRIpHoBk",
            authDomain: "youy-apps.firebaseapp.com",
            databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
            projectId: "youy-apps",
            storageBucket: "youy-apps.firebasestorage.app",
            messagingSenderId: "690543747528",
            appId: "1:690543747528:web:10c85ef8c93b79596620fd"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const examId = urlParams.get('exam');
            if (examId) {
                document.body.classList.add('student-mode');
                document.getElementById('student-check-btn').style.display = 'block';
                loadSpecificExam(examId);
            } else {
                loadQuestions();
            }
        };

        function loadSpecificExam(id) {
            db.ref('models/' + id).once('value', s => {
                const exam = s.val();
                if (exam) {
                    document.getElementById('quiz-content').innerHTML = "";
                    exam.data.forEach(q => addQuestion(q));
                } else { alert("الاختبار غير موجود!"); }
            });
        }

        // --- دالة التصحيح التلقائي للطالب ---
        function gradeExam() {
            let score = 0;
            const cards = document.querySelectorAll('.question-card');
            
            cards.forEach((card, index) => {
                const selected = card.querySelector('.selected-opt span')?.innerText; // حرف الخيار (أ، ب، ج، د)
                const correct = card.querySelector('.ans-val').value.trim(); // الإجابة المخزنة
                
                if (selected === correct) {
                    score++;
                    card.style.borderColor = "#10b981"; // تلوين السؤال الصحيح بالأخضر
                } else {
                    card.style.borderColor = "#ef4444"; // تلوين السؤال الخطأ بالأحمر
                }
            });

            alert(`انتهى الاختبار يا بطل! درجتك هي: (${score} من أصل ${cards.length}) ✅`);
        }

        function generateStudentLink() {
            db.ref('models').once('value', s => {
                const ms = s.val(); if(!ms) return alert("لا توجد نماذج!");
                const names = Object.keys(ms);
                const name = prompt("اختر النموذج لتوليد الرابط:\n\n" + names.join("\n"));
                if (name && ms[name]) {
                    const currentUrl = window.location.origin + window.location.pathname;
                    prompt("انسخ رابط الاختبار التفاعلي للطلاب:", currentUrl + "?exam=" + encodeURIComponent(name));
                }
            });
        }

        function updateNumbers() {
            document.querySelectorAll('.question-card').forEach((card, index) => {
                const badge = card.querySelector('.q-number-badge');
                if (badge) badge.innerText = `السؤال ${index + 1}`;
            });
        }

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            const type = data ? data.type : 'normal';

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="card-meta"><span class="q-number-badge"></span><span class="type-label" style="${document.body.classList.contains('student-mode')?'display:inline-block':'display:none'}">${typeMap[type]}</span><select class="type-select" onchange="toggleType(this)">${Object.keys(typeMap).map(k=>`<option value="${k}" ${type===k?'selected':''}>${typeMap[k]}</option>`).join('')}</select></div>
                    <i class="fas fa-times-circle remove-btn" onclick="removeQuestion(this)"></i>
                </div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="options-grid">${renderOptions(type, data)}</div>
                <div class="correct-ans-box"><input type="text" placeholder="اكتب حرف الإجابة (أ أو ب أو ج أو د)..." class="correct-input ans-val" value="${data?data.ans||'':''}" oninput="saveAll()"></div>
            `;
            container.appendChild(card);
            
            card.querySelectorAll('.opt-pair-row').forEach(row => {
                row.onclick = () => {
                    if (document.body.classList.contains('student-mode')) {
                        card.querySelectorAll('.opt-pair-row').forEach(r => r.classList.remove('selected-opt'));
                        row.classList.add('selected-opt');
                    }
                };
            });

            updateNumbers();
            if(!document.body.classList.contains('student-mode')) saveAll();
        }

        function renderQArea(t, d) {
            if (t === 'tanazor') return `<div class="pair-row"><input type="text" class="pair-word t2" value="${d?d.text2:''}" oninput="saveAll()"><span style="color:red; font-weight:900; font-size:1.5rem"> : </span><input type="text" class="pair-word t1" value="${d?d.text1:''}" oninput="saveAll()"></div>`;
            if (t === 'estieab') return `<textarea class="estieab-box t-area" style="height:100px; width:100%; font-family:Cairo; resize:none;" oninput="saveAll()">${d?d.text_area:''}</textarea><input type="text" class="q-text-input q-main" value="${d?d.text:''}" oninput="saveAll()">`;
            return `<input type="text" class="q-text-input q-main" value="${d?d.text:''}" oninput="saveAll()">`;
        }

        function renderOptions(t, d) {
            let h = ''; const labels = ['أ','ب','ج','د'];
            for(let i=0; i<4; i++) {
                if(t==='tanazor') h+=`<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word op2" value="${d?.opt_pairs?.[i][1]||''}" oninput="saveAll()"><span style="color:red; font-weight:900"> : </span><input type="text" class="opt-word op1" value="${d?.opt_pairs?.[i][0]||''}" oninput="saveAll()"></div>`;
                else h+=`<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word opt" style="margin-right:10px" value="${d?.opts?.[i]||''}" oninput="saveAll()"></div>`;
            }
            return h;
        }

        function toggleType(s) { const c = s.closest('.question-card'); c.querySelector('.q-area').innerHTML = renderQArea(s.value,null); c.querySelector('.options-grid').innerHTML = renderOptions(s.value,null); saveAll(); }
        function removeQuestion(b) { b.closest('.question-card').remove(); updateNumbers(); saveAll(); }

        function collectData() {
            const qs = [];
            document.querySelectorAll('.question-card').forEach(c => {
                const t = c.querySelector('.type-select').value;
                const a = c.querySelector('.ans-val').value;
                let d = { type: t, ans: a };
                if (t === 'tanazor') { d.text1 = c.querySelector('.t1').value; d.text2 = c.querySelector('.t2').value; d.opt_pairs = Array.from(c.querySelectorAll('.opt-pair-row')).map(r => [r.querySelector('.op1').value, r.querySelector('.op2').value]); }
                else { d.text = c.querySelector('.q-main')?.value || ""; if(t==='estieab') d.text_area = c.querySelector('.t-area').value; d.opts = Array.from(c.querySelectorAll('.opt-word.opt')).map(i => i.value); }
                qs.push(d);
            });
            return qs;
        }

        function saveAll() { localStorage.setItem('fifi_v20_quiz', JSON.stringify(collectData())); }
        function loadQuestions() { const s = localStorage.getItem('fifi_v20_quiz'); if(s) JSON.parse(s).forEach(q=>addQuestion(q)); }
        function clearAll() { if(confirm("مسح الكل؟")) { localStorage.clear(); location.reload(); } }

        async function saveToCloud() {
            const name = prompt("أدخل اسم النموذج:");
            if (!name) return;
            try {
                await db.ref('models/' + name).set({ teacher: "أ. عبدالعزيز الفيفي", data: collectData(), date: new Date().toLocaleString() });
                alert("تم الحفظ بنجاح!");
            } catch (e) { alert("خطأ!"); }
        }

        function loadFromCloud() {
            db.ref('models').once('value', s => {
                const ms = s.val(); if(!ms) return;
                const n = Object.keys(ms);
                const choice = prompt("اختر النموذج:\n" + n.join("\n"));
                if (choice && ms[choice]) { localStorage.setItem('fifi_v20_quiz', JSON.stringify(ms[choice].data)); location.reload(); }
            });
        }

        async function deleteFromCloud() {
            db.ref('models').once('value', s => {
                const ms = s.val(); if(!ms) return;
                const choice = prompt("اسم النموذج للحذف:\n" + Object.keys(ms).join("\n"));
                if (choice && ms[choice] && confirm("حذف؟")) { db.ref('models/' + choice).remove().then(()=>alert("تم!")); }
            });
        }

        // وظائف التصدير (PDF وصور) كما هي في النسخ السابقة...
        async function saveAsImages() {
            const cards = Array.from(document.querySelectorAll('.question-card'));
            for (let i = 0; i < cards.length; i += 3) {
                const area = document.createElement('div');
                area.style = "width:850px; padding:25px; background:#f8fafc; position:absolute; top:-9999px;";
                area.appendChild(document.getElementById('main-header').cloneNode(true));
                cards.slice(i, i+3).forEach((orig, idx) => {
                    const clone = orig.cloneNode(true);
                    const type = orig.querySelector('.type-select').value;
                    clone.querySelector('.card-meta').innerHTML = `<span class="q-number-badge">السؤال ${i+idx+1}</span><span class="type-label">${typeMap[type]}</span>`;
                    if(type === 'tanazor') {
                        clone.querySelector('.pair-row').innerHTML = `<div style="display:flex; justify-content:center; align-items:center; width:100%; font-weight:900; font-size:1.5rem; color:var(--q-red);"><span>${orig.querySelector('.t2').value}</span><span style="margin:0 10px;"> : </span><span>${orig.querySelector('.t1').value}</span></div>`;
                        clone.querySelectorAll('.opt-pair-row').forEach((r, oIdx) => {
                            r.innerHTML = `<span style="margin-left:10px;">${r.querySelector('span').innerText}</span> <div style="display:flex; justify-content:center; width:100%; font-weight:900;"><span>${orig.querySelectorAll('.op2')[oIdx].value}</span><span style="margin:0 5px;"> : </span><span>${orig.querySelectorAll('.op1')[oIdx].value}</span></div>`;
                        });
                    } else {
                        clone.querySelectorAll('input, textarea').forEach((inp, ii) => {
                            const origInp = orig.querySelectorAll('input, textarea')[ii];
                            const div = document.createElement('div'); div.innerText = origInp.value;
                            div.style = `background:${window.getComputedStyle(origInp).backgroundColor}; color:${window.getComputedStyle(origInp).color}; padding:10px; border-radius:10px; font-weight:900; font-size:${window.getComputedStyle(origInp).fontSize}; border:${window.getComputedStyle(origInp).border}; margin-bottom:10px; text-align:right;`;
                            inp.replaceWith(div);
                        });
                    }
                    clone.querySelectorAll('.remove-btn, .type-select').forEach(e => e.remove());
                    area.appendChild(clone);
                });
                document.body.appendChild(area);
                await html2canvas(area, { scale: 2, useCORS: true }).then(c => {
                    const l = document.createElement('a'); l.download = `صورة_${Math.floor(i/3)+1}.png`; l.href = c.toDataURL(); l.click();
                });
                document.body.removeChild(area);
            }
        }

        function saveAsPDF() {
            const content = document.createElement('div');
            const cards = Array.from(document.querySelectorAll('.question-card'));
            for (let i = 0; i < cards.length; i += 3) {
                const page = document.createElement('div');
                page.style = "width:210mm; height:297mm; padding:15mm; background:white; box-sizing:border-box;";
                page.appendChild(document.getElementById('main-header').cloneNode(true));
                cards.slice(i, i+3).forEach((orig, idx) => {
                    const clone = orig.cloneNode(true);
                    const type = orig.querySelector('.type-select').value;
                    clone.querySelector('.card-meta').innerHTML = `<span class="q-number-badge">السؤال ${i+idx+1}</span><span class="type-label">${typeMap[type]}</span>`;
                    clone.querySelectorAll('.remove-btn, .type-select').forEach(e => e.remove());
                    if(type === 'tanazor') {
                        clone.querySelector('.pair-row').innerHTML = `<div style="display:flex; justify-content:center; align-items:center; width:100%; font-weight:900; font-size:1.4rem; color:var(--q-red);"><span>${orig.querySelector('.t2').value}</span><span style="margin:0 10px;"> : </span><span>${orig.querySelector('.t1').value}</span></div>`;
                        clone.querySelectorAll('.opt-pair-row').forEach((r, oIdx) => {
                            r.innerHTML = `<span style="margin-left:10px;">${r.querySelector('span').innerText}</span> <div style="display:flex; justify-content:center; width:100%; font-weight:900;"><span>${orig.querySelectorAll('.op2')[oIdx].value}</span><span style="margin:0 5px;"> : </span><span>${orig.querySelectorAll('.op1')[oIdx].value}</span></div>`;
                        });
                    }
                    const txt = clone.querySelector('textarea');
                    if(txt) { const d = document.createElement('div'); d.innerText = txt.value; d.className = "estieab-box"; d.style.height = "auto"; txt.replaceWith(d); }
                    page.appendChild(clone);
                });
                content.appendChild(page);
                if (i+3 < cards.length) { const pb = document.createElement('div'); pb.style.pageBreakAfter = "always"; content.appendChild(pb); }
            }
            html2pdf().set({ margin: 0, filename: 'اختبار.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(content).save();
        }
    </script>
</body>
</html>
