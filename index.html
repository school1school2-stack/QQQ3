<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - الذكاء الاصطناعي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --royal-blue: #1e3a8a; --q-red: #ef4444; --bg-page: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 30px; box-sizing: border-box;
        }
        .header-right { text-align: right; } .header-left { text-align: left; }
        .user-name { margin: 0; color: var(--royal-blue); font-weight: 900; font-size: 1.5rem; }
        .school-name { margin: 0; color: #64748b; font-weight: 700; font-size: 1rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        .container { width: 100%; max-width: 850px; }
        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; transition: 0.3s; }
        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }

        .smart-paste-area { background: #fff3e0; border: 2px dashed #ff9800; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .smart-input { width: 100%; height: 70px; border: none; background: transparent; font-family: 'Cairo'; font-size: 1rem; resize: none; outline: none; text-align: right; font-weight: bold; }

        .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .q-number-badge { background: var(--royal-blue); color: white; padding: 2px 15px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; }
        .type-label { font-size: 0.85rem; font-weight: 900; color: #3b82f6; background: #eff6ff; padding: 4px 12px; border-radius: 20px; }
        .type-select { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; font-weight: 700; font-family: 'Cairo'; cursor: pointer; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: #000; font-weight: 700; line-height: 1.8; width: 100%; box-sizing: border-box; text-align: right; height: auto; min-height: 100px; white-space: pre-wrap; }
        .q-text-input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 12px; box-sizing: border-box; cursor: pointer; transition: 0.2s; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: 900; color: #000; background: transparent; text-align: right; font-family: 'Cairo'; cursor: inherit; }

        .correct-ans-box { margin-top: 15px; padding: 10px; background: #f0fdf4; border-radius: 10px; border: 1px solid #bbf7d0; text-align: right; }
        .correct-input { width: 100%; background: transparent; border: none; outline: none; color: #166534; font-weight: 900; text-align: right; font-family: 'Cairo'; }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; gap: 8px; z-index: 1000; background: rgba(30, 41, 59, 0.95); padding: 12px 20px; border-radius: 50px; backdrop-filter: blur(10px); width: max-content; justify-content: center; }
        .btn { border: none; padding: 8px 15px; border-radius: 30px; font-weight: 800; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; transition: 0.3s; font-family: 'Cairo'; font-size: 0.85rem; }

        #report-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 850px; height: 85%; background: white; z-index: 2000; border-radius: 20px; padding: 30px; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; }

        body.student-mode .controls, body.student-mode .remove-btn, body.student-mode .type-select, body.student-mode .correct-ans-box, body.student-mode .smart-paste-area { display: none !important; }
        body.student-mode .q-text-input, body.student-mode .opt-word, body.student-mode .pair-word { pointer-events: none; border: none; background: transparent !important; }
        body.student-mode .selected-opt { background: #dbeafe !important; border: 2px solid #3b82f6 !important; }
        body.locked-mode .opt-pair-row { pointer-events: none !important; }
    </style>
</head>
<body>

    <div id="modal-overlay" onclick="closeReport()"></div>
    <div id="report-modal">
        <h2 style="text-align: center; color: var(--royal-blue);">تقرير تدريب القدرات 🎯</h2>
        <div id="score-summary" style="text-align: center; font-size: 1.4rem; font-weight: 900; margin: 20px 0;"></div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>السؤال</th>
                    <th>إجابتك</th>
                    <th>الصحيحة</th>
                    <th>النتيجة</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn" style="background:#64748b; width:100%; margin-top:20px;" onclick="closeReport()">إغلاق التقرير</button>
    </div>

    <div class="user-header" id="main-header">
        <div class="header-right"><h2 class="user-name">أ. عبدالعزيز الفيفي</h2></div>
        <div class="header-center"><div class="logo-box"><i class="fas fa-award"></i></div></div>
        <div class="header-left"><p class="school-name">ثانوية الأمير عبدالمجيد 😉</p></div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div id="student-actions" style="display: none; text-align: center; margin-bottom: 50px;">
        <button id="main-grade-btn" class="btn" style="background:#10b981; padding:15px 30px" onclick="gradeExam()"><i class="fas fa-graduation-cap"></i> انتهيت.. أرني النتيجة</button>
        <button class="btn" style="background:#64748b; padding:15px 30px;" onclick="resetExam()"><i class="fas fa-redo"></i> مسح الحل وإعادة الاختبار</button>
    </div>

    <div class="controls" id="admin-controls">
        <button class="btn" style="background:#3b82f6" onclick="addQuestion()"><i class="fas fa-magic"></i> إضافة سؤال ذكي</button>
        <button class="btn" style="background:#a855f7" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i> حفظ</button>
        <button class="btn" style="background:#4f46e5" onclick="loadFromCloud()"><i class="fas fa-cloud-download-alt"></i> فتح</button>
        <button class="btn" style="background:#06b6d4" onclick="generateStudentLink()"><i class="fas fa-link"></i> رابط الطلاب</button>
        <button class="btn" style="background:#f97316" onclick="deleteFromCloud()"><i class="fas fa-trash-alt"></i> حذف</button>
        <button class="btn" style="background:#ef4444" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
    </div>

    <script>
        const typeMap = { 'normal': 'إكمال جمل / خطأ سياقي', 'tanazor': 'تناظر لفظي ( : )', 'estieab': 'استيعاب المقروء', 'shaza': 'المفردة الشاذة', 'irtibat': 'الارتباط والافتلاف' };
        
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyAVrIim7aXjg0hGrMk0qVrXT8geRIpHoBk",
            authDomain: "youy-apps.firebaseapp.com",
            databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
            projectId: "youy-apps",
            storageBucket: "youy-apps.firebasestorage.app",
            messagingSenderId: "690543747528",
            appId: "1:690543747528:web:10c85ef8c93b79596620fd"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const examId = urlParams.get('exam');
            if (examId) {
                document.body.classList.add('student-mode');
                document.getElementById('student-actions').style.display = 'block';
                loadSpecificExam(examId);
            } else { loadQuestions(); }
        };

        // --- دالة المحلل الذكي الفائقة ---
        function smartParse(textarea) {
            const text = textarea.value;
            const card = textarea.closest('.question-card');
            
            // 1. تنظيف النص من أرقام الأسئلة في البداية
            let cleanText = text.replace(/^\d+[\s\.\-\)]+/, '').trim();

            // 2. تقسيم النص لاستخراج السؤال (كل ما قبل أول خيار)
            const splitRegex = /[\s\(]([أ-ب-ج-د])[\s\.\-\)]/;
            const questionPart = cleanText.split(splitRegex)[0].trim();
            if(questionPart) card.querySelector('.q-main').value = questionPart;

            // 3. البحث عن الخيارات بأي تنسيق (أ، أ-، أ.، (أ))
            const patterns = {
                a: /[\s\(]أ[\s\.\-\)]+\s*([^\nبجدهـ]+)/,
                b: /[\s\(]ب[\s\.\-\)]+\s*([^\nجدهـ]+)/,
                c: /[\s\(]ج[\s\.\-\)]+\s*([^\nدهـ]+)/,
                d: /[\s\(]د[\s\.\-\)]+\s*([^\nهـ]+)/
            };

            Object.keys(patterns).forEach(key => {
                const match = cleanText.match(patterns[key]);
                if(match) card.querySelector('.opt-' + key).value = match[1].trim();
            });
            saveAll();
        }

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            const type = data ? data.type : 'normal';
            card.innerHTML = `
                <div class="smart-paste-area"><textarea class="smart-input" placeholder="الصق السؤال مع الخيارات هنا (مثلاً: ما عاصمة مصر؟ أ- القاهرة ب- دبي...)" oninput="smartParse(this)"></textarea></div>
                <div class="card-meta"><span class="q-number-badge"></span><select class="type-select" onchange="toggleType(this)">${Object.keys(typeMap).map(k=>`<option value="${k}" ${type===k?'selected':''}>${typeMap[k]}</option>`).join('')}</select></div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="options-grid">${renderOptions(type, data)}</div>
                <div class="correct-ans-box"><input type="text" placeholder="حرف الإجابة فقط" class="correct-input ans-val" value="${data?data.ans||'':''}" oninput="saveAll()"></div>
                <button class="remove-btn btn" style="background:#64748b; margin-top:10px" onclick="this.closest('.question-card').remove();updateNumbers();saveAll();">حذف السؤال</button>
            `;
            container.appendChild(card);
            card.querySelectorAll('.opt-pair-row').forEach(row => {
                row.onclick = () => { if (document.body.classList.contains('student-mode') && !document.body.classList.contains('locked-mode')) { card.querySelectorAll('.opt-pair-row').forEach(r => r.classList.remove('selected-opt')); row.classList.add('selected-opt'); } };
            });
            updateNumbers();
            if(!document.body.classList.contains('student-mode')) saveAll();
        }

        function renderQArea(t, d) {
            if (t === 'tanazor') return `<div class="pair-row"><input type="text" class="pair-word t2" value="${d?d.text2:''}" oninput="saveAll()"><span style="color:red; font-weight:900; font-size:1.5rem"> : </span><input type="text" class="pair-word t1" value="${d?d.text1:''}" oninput="saveAll()"></div>`;
            if (t === 'estieab') return `<div class="estieab-box" ${!document.body.classList.contains('student-mode')?'contenteditable="true" oninput="saveAll()"':''}>${d?d.text_area||'نص القطعة...':''}</div><input type="text" class="q-text-input q-main" value="${d?d.text:''}" oninput="saveAll()">`;
            return `<input type="text" class="q-text-input q-main" value="${d?d.text:''}" oninput="saveAll()">`;
        }

        function renderOptions(t, d) {
            let h = ''; const labels = ['أ','ب','ج','د']; const ids = ['a','b','c','d'];
            for(let i=0; i<4; i++) {
                if(t==='tanazor') h+=`<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word op2" value="${d?.opt_pairs?.[i][1]||''}" oninput="saveAll()"><span style="color:red; font-weight:900"> : </span><input type="text" class="opt-word op1" value="${d?.opt_pairs?.[i][0]||''}" oninput="saveAll()"></div>`;
                else h+=`<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word opt-${ids[i]} opt" style="margin-right:10px" value="${d?.opts?.[i]||''}" oninput="saveAll()"></div>`;
            }
            return h;
        }

        // --- بقية الدوال (التصحيح، الحفظ، السحابة) ---
        function gradeExam() {
            let s = 0; const cards = document.querySelectorAll('.question-card'); const report = document.getElementById('report-body'); report.innerHTML = "";
            document.body.classList.add('locked-mode'); document.getElementById('main-grade-btn').disabled = true;
            cards.forEach((c, i) => {
                const sel = c.querySelector('.selected-opt span')?.innerText || "لم يحل";
                const cor = c.querySelector('.ans-val').value.trim().toUpperCase();
                const isCor = sel === cor; if(isCor) s++;
                const qTxt = c.querySelector('.q-main')?.value || c.querySelector('.pair-word.t2')?.value || "سؤال مركب";
                report.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right">${qTxt}</td><td style="color:${isCor?'#10b981':'#ef4444'}">${sel}</td><td style="color:#10b981">${cor}</td><td>${isCor?'✅':'❌'}</td></tr>`;
                c.style.borderColor = isCor ? "#10b981" : "#ef4444";
            });
            document.getElementById('score-summary').innerText = `النتيجة النهائية: ${s} من ${cards.length}`;
            document.getElementById('report-modal').style.display = 'block'; document.getElementById('modal-overlay').style.display = 'block';
        }
        function closeReport() { document.getElementById('report-modal').style.display = 'none'; document.getElementById('modal-overlay').style.display = 'none'; }
        function resetExam() { if(confirm("إعادة الاختبار؟")) { document.body.classList.remove('locked-mode'); document.getElementById('main-grade-btn').disabled = false; document.querySelectorAll('.opt-pair-row').forEach(r => r.classList.remove('selected-opt')); document.querySelectorAll('.question-card').forEach(c => c.style.borderColor = "#e2e8f0"); window.scrollTo({top:0,behavior:'smooth'}); } }
        function updateNumbers() { document.querySelectorAll('.q-number-badge').forEach((b, i) => b.innerText = `السؤال ${i+1}`); }
        function toggleType(s) { const c = s.closest('.question-card'); c.querySelector('.q-area').innerHTML = renderQArea(s.value,null); c.querySelector('.options-grid').innerHTML = renderOptions(s.value,null); saveAll(); }
        function saveAll() {
            const qs = []; document.querySelectorAll('.question-card').forEach(c => {
                const t = c.querySelector('.type-select').value; const a = c.querySelector('.ans-val').value; let d = { type: t, ans: a };
                if (t === 'tanazor') { d.text1 = c.querySelector('.t1').value; d.text2 = c.querySelector('.t2').value; d.opt_pairs = Array.from(c.querySelectorAll('.opt-pair-row')).map(r => [r.querySelector('.op1').value, r.querySelector('.op2').value]); }
                else { d.text = c.querySelector('.q-main')?.value || ""; if(t==='estieab') d.text_area = c.querySelector('.estieab-box').innerText; d.opts = Array.from(c.querySelectorAll('.opt-word.opt')).map(i => i.value); }
                qs.push(d);
            });
            localStorage.setItem('fifi_v26_all', JSON.stringify(qs));
        }
        function loadQuestions() { const s = localStorage.getItem('fifi_v26_all'); if(s) JSON.parse(s).forEach(q=>addQuestion(q)); }
        async function saveToCloud() { const n = prompt("اسم النموذج:"); if(n) { await db.ref('models/' + n).set({ teacher: "أ. عبدالعزيز الفيفي", data: JSON.parse(localStorage.getItem('fifi_v26_all')), date: new Date().toLocaleString() }); alert("تم الحفظ بنجاح!"); } }
        function loadFromCloud() { db.ref('models').once('value', s => { const ms = s.val(); if(ms) { const c = prompt("اختر النموذج:\n" + Object.keys(ms).join("\n")); if(c && ms[c]) { localStorage.setItem('fifi_v26_all', JSON.stringify(ms[c].data)); location.reload(); } } }); }
        function generateStudentLink() { const n = prompt("اسم النموذج للرابط:"); if(n) prompt("رابط الطلاب:", window.location.origin + window.location.pathname + "?exam=" + encodeURIComponent(n)); }
        async function deleteFromCloud() { const n = prompt("اسم النموذج للحذف:"); if(n && confirm("حذف نهائي؟")) db.ref('models/' + n).remove().then(()=>alert("تم!")); }
        function loadSpecificExam(id) { db.ref('models/' + id).once('value', s => { const exam = s.val(); if (exam) { document.getElementById('quiz-content').innerHTML = ""; exam.data.forEach(q => addQuestion(q)); } }); }
    </script>
</body>
</html>
