<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - التميز في القدرات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --royal-blue: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --q-red: #ef4444;
            --gold: #f59e0b;
            --bg-page: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-page);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ترويسة احترافية جداً */
        .user-header {
            width: 100%; max-width: 900px;
            background: white;
            border-radius: 20px;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-bottom: 5px solid #3b82f6;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .user-header::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--royal-blue);
        }

        .header-info h2 {
            margin: 0; background: var(--royal-blue); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; font-weight: 900; font-size: 2rem;
        }

        .header-info p {
            margin: 5px 0 0; color: #64748b; font-weight: 800; font-size: 1.2rem;
        }

        .edu-icon-container {
            background: var(--royal-blue); width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px; color: white; transform: rotate(-5deg);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            font-size: 2.5rem;
        }

        .container { width: 100%; max-width: 900px; }

        /* بطاقة السؤال الاحترافية */
        .question-card {
            background: var(--glass);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            position: relative;
            transition: transform 0.3s ease;
        }

        .question-card:hover { transform: translateY(-5px); }

        .question-card::before {
            content: ""; position: absolute; right: 0; top: 20px; bottom: 20px;
            width: 6px; background: var(--royal-blue); border-radius: 10px 0 0 10px;
        }

        .type-select {
            background: #f1f5f9; border: none; padding: 10px 20px;
            border-radius: 12px; font-weight: 700; color: #1e293b;
            font-family: 'Cairo'; cursor: pointer; margin-bottom: 20px;
        }

        /* تصميم التناظر اللفظي الفخم */
        .pair-row {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin: 20px 0; background: #fff1f2;
            padding: 20px; border-radius: 18px; border: 2px dashed #fca5a5;
        }

        .pair-word {
            width: 40%; text-align: center; border: none;
            background: white; padding: 12px; border-radius: 12px;
            color: var(--q-red); font-weight: 900; font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); outline: none;
        }

        .sep-3d { color: var(--q-red); font-size: 2rem; font-weight: 900; text-shadow: 2px 2px 0px #fff; }

        .opt-pair-row {
            display: flex; align-items: center; justify-content: space-around;
            background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 10px;
        }

        .opt-word {
            width: 40%; text-align: center; border: none; outline: none;
            font-weight: 800; font-size: 1.1rem; color: #1e293b; background: transparent;
        }

        .q-text-input {
            width: 100%; padding: 18px; border: 2px solid #e2e8f0;
            border-radius: 15px; color: var(--q-red); font-weight: 900;
            font-size: 1.3rem; margin-bottom: 20px; outline: none; transition: 0.3s;
        }

        .q-text-input:focus { border-color: var(--q-red); background: #fff1f2; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .correct-ans-box {
            margin-top: 20px; padding: 15px; background: #f0fdf4;
            border-radius: 15px; border: 1px solid #bbf7d0;
        }

        .correct-input {
            width: 100%; background: transparent; border: none; outline: none;
            color: #166534; font-weight: 900; font-size: 1.1rem; text-align: right;
        }

        /* أزرار التحكم الفضائية */
        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000; background: rgba(30, 41, 59, 0.9);
            padding: 15px 40px; border-radius: 100px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .btn {
            border: none; padding: 12px 25px; border-radius: 50px;
            font-weight: 800; cursor: pointer; display: flex; align-items: center;
            gap: 10px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1rem; color: white;
        }

        .btn-add { background: var(--royal-blue); }
        .btn-pdf { background: #dc2626; }
        .btn-clear { background: #64748b; }
        .btn:hover { transform: scale(1.1) translateY(-5px); }

        .remove-btn { color: #cbd5e1; cursor: pointer; font-size: 1.5rem; transition: 0.3s; }
        .remove-btn:hover { color: var(--q-red); }

        @media (max-width: 600px) {
            .user-header { padding: 15px; flex-direction: row; }
            .header-info h2 { font-size: 1.4rem; }
            .edu-icon-container { width: 50px; height: 50px; font-size: 1.5rem; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="user-header" id="pdf-header">
        <div class="edu-icon-container">
            <i class="fas fa-award"></i>
        </div>
        <div class="header-info">
            <h2>أ. عبدالعزيز الفيفي</h2>
            <p> 😉 ثانوية الأمير عبدالمجيد </p>
        </div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()">
            <i class="fas fa-plus-circle"></i> إضافة سؤال
        </button>
        <button class="btn btn-pdf" id="pdfBtn" style="display: none;" onclick="saveAsPDF()">
            <i class="fas fa-file-export"></i> تصدير PDF
        </button>
        <button class="btn btn-clear" onclick="clearAll()">
            <i class="fas fa-trash-alt"></i> مسح
        </button>
    </div>

    <script>
        window.onload = loadQuestions;

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            const type = data ? data.type : 'normal';

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <select class="type-select" onchange="toggleType(this)">
                        <option value="normal" ${type === 'normal' ? 'selected' : ''}>سؤال عادي / إكمال جمل</option>
                        <option value="tanazor" ${type === 'tanazor' ? 'selected' : ''}>تناظر لفظي ( : )</option>
                        <option value="estieab" ${type === 'estieab' ? 'selected' : ''}>استيعاب المقروء</option>
                        <option value="khata" ${type === 'khata' ? 'selected' : ''}>خطأ سياقي</option>
                    </select>
                    <i class="fas fa-times-circle remove-btn" onclick="removeQuestion(this)"></i>
                </div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="options-grid">${renderOptions(type, data)}</div>
                <div class="correct-ans-box">
                    <input type="text" placeholder="أدخل الإجابة النموذجية هنا..." class="correct-input ans-val" value="${data ? (data.ans || '') : ''}" oninput="saveAll()">
                </div>
            `;
            container.appendChild(card);
            updateUI();
            saveAll();
        }

        function renderQArea(type, data) {
            if (type === 'tanazor') {
                return `
                    <div class="pair-row">
                        <input type="text" placeholder="كلمة 2" class="pair-word t2" value="${data ? data.text2 : ''}" oninput="saveAll()">
                        <span class="sep-3d">:</span>
                        <input type="text" placeholder="كلمة 1" class="pair-word t1" value="${data ? data.text1 : ''}" oninput="saveAll()">
                    </div>`;
            } else if (type === 'estieab') {
                return `
                    <textarea class="estieab-textarea q-text-input" style="height:120px; color:#1e3a8a; font-weight:600" placeholder="نص القطعة..." oninput="saveAll()">${data ? data.text_area : ''}</textarea>
                    <input type="text" placeholder="السؤال المتعلق بالقطعة..." class="q-text-input q-main" value="${data ? data.text : ''}" oninput="saveAll()">`;
            } else {
                return `<input type="text" placeholder="نص السؤال..." class="q-text-input q-main" value="${data ? data.text : ''}" oninput="saveAll()">`;
            }
        }

        function renderOptions(type, data) {
            let html = '';
            const labels = ['أ', 'ب', 'ج', 'د'];
            for (let i = 0; i < 4; i++) {
                if (type === 'tanazor') {
                    const v1 = data?.opt_pairs ? data.opt_pairs[i][0] : '';
                    const v2 = data?.opt_pairs ? data.opt_pairs[i][1] : '';
                    html += `<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" placeholder="2" class="opt-word op2" value="${v2}" oninput="saveAll()"><span style="color:red; font-weight:900">:</span><input type="text" placeholder="1" class="opt-word op1" value="${v1}" oninput="saveAll()"></div>`;
                } else {
                    const val = data?.opts ? data.opts[i] : '';
                    html += `<div class="opt-pair-row" style="justify-content:flex-start; gap:10px"><span>${labels[i]}</span><input type="text" placeholder="الخيار..." class="opt-word opt" style="width:90%; text-align:right" value="${val}" oninput="saveAll()"></div>`;
                }
            }
            return html;
        }

        function toggleType(select) {
            const card = select.closest('.question-card');
            card.querySelector('.q-area').innerHTML = renderQArea(select.value, null);
            card.querySelector('.options-grid').innerHTML = renderOptions(select.value, null);
            saveAll();
        }

        function removeQuestion(btn) { btn.closest('.question-card').remove(); saveAll(); updateUI(); }

        function saveAll() {
            const questions = [];
            document.querySelectorAll('.question-card').forEach(card => {
                const type = card.querySelector('.type-select').value;
                const ans = card.querySelector('.ans-val').value;
                let qData = { type, ans };
                if (type === 'tanazor') {
                    qData.text1 = card.querySelector('.t1').value; qData.text2 = card.querySelector('.t2').value;
                    qData.opt_pairs = Array.from(card.querySelectorAll('.opt-pair-row')).map(row => [row.querySelector('.op1').value, row.querySelector('.op2').value]);
                } else {
                    qData.text = card.querySelector('.q-main')?.value || "";
                    if(type === 'estieab') qData.text_area = card.querySelector('.q-text-input').value;
                    qData.opts = Array.from(card.querySelectorAll('.opt')).map(i => i.value);
                }
                questions.push(qData);
            });
            localStorage.setItem('fifi_qudurat_ultimate_v3', JSON.stringify(questions));
        }

        function loadQuestions() {
            const saved = localStorage.getItem('fifi_qudurat_ultimate_v3');
            if (saved) JSON.parse(saved).forEach(q => addQuestion(q));
            updateUI();
        }

        function updateUI() { document.getElementById('pdfBtn').style.display = document.querySelectorAll('.question-card').length > 0 ? 'flex' : 'none'; }

        function clearAll() { if(confirm("حذف كل الأسئلة؟")) { localStorage.removeItem('fifi_qudurat_ultimate_v3'); location.reload(); } }

        function saveAsPDF() {
            const mainContainer = document.createElement('div');
            const cards = Array.from(document.querySelectorAll('.question-card'));
            for (let i = 0; i < cards.length; i += 3) {
                const page = document.createElement('div');
                page.style.padding = "15px";
                page.appendChild(document.getElementById('pdf-header').cloneNode(true));
                for (let j = i; j < i + 3 && j < cards.length; j++) {
                    const clone = cards[j].cloneNode(true);
                    clone.querySelector('.type-select').remove();
                    clone.querySelector('.remove-btn').remove();
                    page.appendChild(clone);
                }
                mainContainer.appendChild(page);
                if (i + 3 < cards.length) { const pb = document.createElement('div'); pb.style.pageBreakAfter = "always"; mainContainer.appendChild(pb); }
            }
            html2pdf().set({ margin: 5, filename: 'قدرات_أ_عبدالعزيز_الفيفي.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(mainContainer).save();
        }
    </script>
</body>
</html>
