<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - القدرات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --royal-blue: #1e3a8a;
            --q-red: #ef4444;
            --bg-page: #f8fafc;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 30px; box-sizing: border-box;
        }

        .header-right { text-align: right; }
        .header-left { text-align: left; }
        .header-center { display: flex; justify-content: center; }

        .user-name { margin: 0; color: var(--royal-blue); font-weight: 900; font-size: 1.5rem; }
        .school-name { margin: 0; color: #64748b; font-weight: 700; font-size: 1rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        .container { width: 100%; max-width: 850px; }

        .question-card {
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px;
            border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; overflow: hidden;
        }

        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }

        .q-number-badge {
            background: var(--royal-blue); color: white; padding: 2px 15px; border-radius: 50px;
            font-weight: 900; font-size: 0.9rem; margin-left: 10px; display: inline-block;
        }

        .type-label { font-size: 0.85rem; font-weight: 900; color: #3b82f6; background: #eff6ff; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; display: inline-block; }
        .type-select { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; font-weight: 700; margin-bottom: 15px; font-family: 'Cairo'; cursor: pointer; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: #000; font-weight: 700; line-height: 1.7; width: 100%; box-sizing: border-box; }
        .q-text-input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 8px; box-sizing: border-box; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: 900; color: #000; background: transparent; text-align: right; font-family: 'Cairo'; }

        .pair-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #fff1f2; padding: 15px; border-radius: 12px; border: 1.5px dashed #fca5a5; width: 100%; box-sizing: border-box; }
        .pair-word { width: 45%; text-align: center; border: none; background: white; padding: 10px; border-radius: 8px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; }

        .correct-ans-box { margin-top: 15px; padding: 10px; background: #f0fdf4; border-radius: 10px; border: 1px solid #bbf7d0; box-sizing: border-box; }
        .correct-input { width: 100%; background: transparent; border: none; outline: none; color: #166534; font-weight: 900; text-align: right; font-family: 'Cairo'; }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; background: rgba(30, 41, 59, 0.95); padding: 12px 25px; border-radius: 50px; backdrop-filter: blur(10px); width: max-content; }
        .btn { border: none; padding: 10px 18px; border-radius: 30px; font-weight: 800; cursor: pointer; color: white; display: flex; align-items: center; gap: 6px; transition: 0.3s; font-family: 'Cairo'; font-size: 0.9rem; }
        
        .btn-add { background: #3b82f6; }
        .btn-pdf { background: #ef4444; }
        .btn-img { background: #10b981; }
        .btn-clear { background: #64748b; }
        .remove-btn { color: #cbd5e1; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="user-header" id="main-header">
        <div class="header-right">
            <h2 class="user-name">أ. عبدالعزيز الفيفي</h2>
        </div>
        <div class="header-center">
            <div class="logo-box"><i class="fas fa-award"></i></div>
        </div>
        <div class="header-left">
            <p class="school-name">ثانوية الأمير عبدالمجيد 😉</p>
        </div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()"><i class="fas fa-plus"></i> سؤال</button>
        <button class="btn btn-pdf" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn btn-img" onclick="saveAsImages()"><i class="fas fa-image"></i> حفظ صور</button>
        <button class="btn btn-clear" onclick="clearAll()"><i class="fas fa-trash"></i></button>
    </div>

    <script>
        window.onload = loadQuestions;

        const typeMap = {
            'normal': 'إكمال جمل / خطأ سياقي',
            'tanazor': 'تناظر لفظي ( : )',
            'estieab': 'استيعاب المقروء',
            'shaza': 'المفردة الشاذة',
            'irtibat': 'الارتباط والاختلاف'
        };

        function updateQuestionNumbers() {
            document.querySelectorAll('.question-card').forEach((card, index) => {
                const badge = card.querySelector('.q-number-badge');
                if (badge) badge.innerText = `السؤال ${index + 1}`;
            });
        }

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            const type = data ? data.type : 'normal';

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="card-meta">
                        <span class="q-number-badge">السؤال</span>
                        <select class="type-select" onchange="toggleType(this)">
                            ${Object.keys(typeMap).map(k => `<option value="${k}" ${type === k ? 'selected' : ''}>${typeMap[k]}</option>`).join('')}
                        </select>
                    </div>
                    <i class="fas fa-times-circle remove-btn" onclick="removeQuestion(this)"></i>
                </div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="options-grid">${renderOptions(type, data)}</div>
                <div class="correct-ans-box">
                    <input type="text" placeholder="الإجابة النموذجية..." class="correct-input ans-val" value="${data ? (data.ans || '') : ''}" oninput="saveAll()">
                </div>
            `;
            container.appendChild(card);
            updateQuestionNumbers();
            saveAll();
        }

        function renderQArea(type, data) {
            if (type === 'tanazor') {
                return `<div class="pair-row"><input type="text" placeholder="2" class="pair-word t2" value="${data ? data.text2 : ''}" oninput="saveAll()"><span style="color:red; font-weight:900; font-size:1.5rem"> : </span><input type="text" placeholder="1" class="pair-word t1" value="${data ? data.text1 : ''}" oninput="saveAll()"></div>`;
            } else if (type === 'estieab') {
                return `<textarea class="estieab-box t-area" style="height:100px; width:100%; font-family:Cairo; resize:none;" placeholder="نص القطعة..." oninput="saveAll()">${data ? data.text_area : ''}</textarea><input type="text" placeholder="السؤال..." class="q-text-input q-main" value="${data ? data.text : ''}" oninput="saveAll()">`;
            } else {
                return `<input type="text" placeholder="اكتب السؤال هنا..." class="q-text-input q-main" value="${data ? data.text : ''}" oninput="saveAll()">`;
            }
        }

        function renderOptions(type, data) {
            let html = '';
            const labels = ['أ', 'ب', 'ج', 'د'];
            for (let i = 0; i < 4; i++) {
                if (type === 'tanazor') {
                    const v1 = data?.opt_pairs ? data.opt_pairs[i][0] : '';
                    const v2 = data?.opt_pairs ? data.opt_pairs[i][1] : '';
                    html += `<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word op2" value="${v2}" oninput="saveAll()"><span style="color:red; font-weight:900"> : </span><input type="text" class="opt-word op1" value="${v1}" oninput="saveAll()"></div>`;
                } else {
                    const val = data?.opts ? data.opts[i] : '';
                    html += `<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word opt" style="margin-right:10px" value="${val}" oninput="saveAll()"></div>`;
                }
            }
            return html;
        }

        function toggleType(select) {
            const card = select.closest('.question-card');
            card.querySelector('.q-area').innerHTML = renderQArea(select.value, null);
            card.querySelector('.options-grid').innerHTML = renderOptions(select.value, null);
            saveAll();
        }

        function removeQuestion(btn) { 
            btn.closest('.question-card').remove(); 
            updateQuestionNumbers();
            saveAll(); 
        }

        function saveAll() {
            const questions = [];
            document.querySelectorAll('.question-card').forEach(card => {
                const type = card.querySelector('.type-select').value;
                const ans = card.querySelector('.ans-val').value;
                let qData = { type, ans };
                if (type === 'tanazor') {
                    qData.text1 = card.querySelector('.t1').value; qData.text2 = card.querySelector('.t2').value;
                    qData.opt_pairs = Array.from(card.querySelectorAll('.opt-pair-row')).map(row => [row.querySelector('.op1').value, row.querySelector('.op2').value]);
                } else {
                    qData.text = card.querySelector('.q-main')?.value || "";
                    if(type === 'estieab') qData.text_area = card.querySelector('.t-area').value;
                    qData.opts = Array.from(card.querySelectorAll('.opt-word.opt')).map(i => i.value);
                }
                questions.push(qData);
            });
            localStorage.setItem('fifi_v13_final', JSON.stringify(questions));
        }

        function loadQuestions() {
            const saved = localStorage.getItem('fifi_v13_final');
            if (saved) JSON.parse(saved).forEach(q => addQuestion(q));
        }

        function clearAll() { if(confirm("مسح الكل؟")) { localStorage.clear(); location.reload(); } }

        async function saveAsImages() {
            const originalCards = Array.from(document.querySelectorAll('.question-card'));
            if (originalCards.length === 0) return;

            for (let i = 0; i < originalCards.length; i += 3) {
                const captureArea = document.createElement('div');
                captureArea.style.width = "850px"; captureArea.style.padding = "25px"; captureArea.style.background = "#f8fafc";
                captureArea.appendChild(document.getElementById('main-header').cloneNode(true));
                
                const cardsGroup = originalCards.slice(i, i + 3);
                cardsGroup.forEach((originalCard, localIdx) => {
                    const cardClone = originalCard.cloneNode(true);
                    const globalIdx = i + localIdx + 1;
                    const type = originalCard.querySelector('.type-select').value;
                    
                    // تنظيف الكلون قبل إضافة المعلومات الجديدة لضمان عدم التكرار
                    cardClone.querySelector('.card-meta').innerHTML = `<span class="q-number-badge">السؤال ${globalIdx}</span><span class="type-label">${typeMap[type]}</span>`;

                    if(type === 'tanazor') {
                        const row = cardClone.querySelector('.pair-row');
                        row.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; width:100%; font-weight:900; font-size:1.5rem; color:var(--q-red);"><span>${originalCard.querySelector('.t2').value}</span><span style="margin:0 10px;"> : </span><span>${originalCard.querySelector('.t1').value}</span></div>`;
                        cardClone.querySelectorAll('.opt-pair-row').forEach((optRow, optIdx) => {
                            const op1 = originalCard.querySelectorAll('.op1')[optIdx].value;
                            const op2 = originalCard.querySelectorAll('.op2')[optIdx].value;
                            const char = optRow.querySelector('span').innerText;
                            optRow.innerHTML = `<span style="margin-left:10px;">${char}</span> <div style="display:flex; justify-content:center; width:100%; font-weight:900;"><span>${op2}</span><span style="margin:0 5px;"> : </span><span>${op1}</span></div>`;
                        });
                    } else {
                        cardClone.querySelectorAll('input, textarea').forEach((input, idx) => {
                            const originalInput = originalCard.querySelectorAll('input, textarea')[idx];
                            const textSpan = document.createElement('div');
                            textSpan.innerText = originalInput.value;
                            textSpan.style.background = window.getComputedStyle(originalInput).backgroundColor;
                            textSpan.style.color = window.getComputedStyle(originalInput).color;
                            textSpan.style.padding = "10px"; textSpan.style.borderRadius = "10px";
                            textSpan.style.fontWeight = "900"; textSpan.style.fontSize = window.getComputedStyle(originalInput).fontSize;
                            textSpan.style.border = window.getComputedStyle(originalInput).border;
                            textSpan.style.marginBottom = "10px";
                            input.replaceWith(textSpan);
                        });
                    }
                    cardClone.querySelectorAll('.remove-btn, .type-select').forEach(el => el.remove());
                    captureArea.appendChild(cardClone);
                });

                document.body.appendChild(captureArea);
                captureArea.style.position = "absolute"; captureArea.style.top = "-9999px";

                await html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: "#f8fafc" }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `اختبار_الفيفي_صورة_${Math.floor(i/3)+1}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                });
                document.body.removeChild(captureArea);
            }
        }

        function saveAsPDF() {
            const pdfContent = document.createElement('div');
            const cards = Array.from(document.querySelectorAll('.question-card'));
            for (let i = 0; i < cards.length; i += 3) {
                const page = document.createElement('div');
                page.style.width = "210mm"; page.style.height = "297mm";
                page.style.padding = "15mm"; page.style.background = "white";
                page.appendChild(document.getElementById('main-header').cloneNode(true));
                for (let j = i; j < i + 3 && j < cards.length; j++) {
                    const clone = cards[j].cloneNode(true);
                    const type = cards[j].querySelector('.type-select').value;
                    
                    clone.querySelector('.card-meta').innerHTML = `<span class="q-number-badge">السؤال ${j+1}</span><span class="type-label">${typeMap[type]}</span>`;

                    clone.querySelector('.remove-btn').remove();
                    
                    if(type === 'tanazor') {
                        clone.querySelector('.pair-row').innerHTML = `<div style="display:flex; justify-content:center; align-items:center; width:100%; font-weight:900; font-size:1.4rem; color:var(--q-red);"><span>${cards[j].querySelector('.t2').value}</span><span style="margin:0 10px;"> : </span><span>${cards[j].querySelector('.t1').value}</span></div>`;
                        clone.querySelectorAll('.opt-pair-row').forEach((row, oIdx) => {
                            row.innerHTML = `<span style="margin-left:10px;">${row.querySelector('span').innerText}</span> <div style="display:flex; justify-content:center; width:100%; font-weight:900;"><span>${cards[j].querySelectorAll('.op2')[oIdx].value}</span><span style="margin:0 5px;"> : </span><span>${cards[j].querySelectorAll('.op1')[oIdx].value}</span></div>`;
                        });
                    }

                    const textarea = clone.querySelector('textarea');
                    if(textarea) {
                        const div = document.createElement('div'); div.innerText = textarea.value;
                        div.className = "estieab-box"; div.style.height = "auto"; textarea.replaceWith(div);
                    }
                    page.appendChild(clone);
                }
                pdfContent.appendChild(page);
            }
            html2pdf().set({ margin: 0, filename: 'اختبار_الفيفي.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(pdfContent).save();
        }
    </script>
</body>
</html>
