<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - القدرات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --royal-blue: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --q-red: #ef4444;
            --bg-page: #f8fafc;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 30px; box-sizing: border-box;
        }

        .header-info h2 { margin: 0; background: var(--royal-blue); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 1.8rem; }
        .header-info p { margin: 5px 0 0; color: #64748b; font-weight: 700; font-size: 1rem; }

        .container { width: 100%; max-width: 850px; }

        .question-card {
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px;
            border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; overflow: hidden;
        }

        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }

        .type-select { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; font-weight: 700; margin-bottom: 15px; font-family: 'Cairo'; cursor: pointer; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: #000; font-weight: 700; line-height: 1.7; width: 100%; box-sizing: border-box; }

        .q-text-input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 8px; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: 900; color: #000; background: transparent; text-align: right; font-family: 'Cairo'; }

        .pair-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #fff1f2; padding: 15px; border-radius: 12px; border: 1.5px dashed #fca5a5; }
        .pair-word { width: 45%; text-align: center; border: none; background: white; padding: 10px; border-radius: 8px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; }

        .correct-ans-box { margin-top: 15px; padding: 10px; background: #f0fdf4; border-radius: 10px; border: 1px solid #bbf7d0; }
        .correct-input { width: 100%; background: transparent; border: none; outline: none; color: #166534; font-weight: 900; text-align: right; }

        /* التحكم - أزرار سفلية مطورة */
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; background: rgba(30, 41, 59, 0.95); padding: 10px 25px; border-radius: 50px; backdrop-filter: blur(10px); width: max-content; }
        .btn { border: none; padding: 10px 18px; border-radius: 30px; font-weight: 800; cursor: pointer; color: white; display: flex; align-items: center; gap: 6px; transition: 0.3s; font-family: 'Cairo'; font-size: 0.9rem; }
        
        .btn-add { background: #3b82f6; }
        .btn-pdf { background: #ef4444; }
        .btn-img { background: #10b981; } /* لون أخضر لزر الصورة */
        .btn-clear { background: #64748b; }

        .remove-btn { color: #cbd5e1; cursor: pointer; font-size: 1.2rem; }
        
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } .controls { padding: 10px 15px; gap: 5px; } .btn { padding: 8px 12px; font-size: 0.8rem; } }
    </style>
</head>
<body>

    <div class="user-header" id="main-header">
        <div style="background: var(--royal-blue); width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem;">
            <i class="fas fa-award"></i>
        </div>
        <div class="header-info">
            <h2>أ. عبدالعزيز الفيفي</h2>
            <p>😉 ثانوية الأمير عبدالمجيد</p>
        </div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()"><i class="fas fa-plus"></i> سؤال</button>
        <button class="btn btn-pdf" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn btn-img" onclick="saveAsImage()"><i class="fas fa-image"></i> صورة</button>
        <button class="btn btn-clear" onclick="clearAll()"><i class="fas fa-trash"></i></button>
    </div>

    <script>
        window.onload = loadQuestions;

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            const type = data ? data.type : 'normal';

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <select class="type-select" onchange="toggleType(this)">
                        <option value="normal" ${type === 'normal' ? 'selected' : ''}>إكمال جمل / خطأ سياقي</option>
                        <option value="tanazor" ${type === 'tanazor' ? 'selected' : ''}>تناظر لفظي ( : )</option>
                        <option value="estieab" ${type === 'estieab' ? 'selected' : ''}>استيعاب المقروء</option>
                        <option value="shaza" ${type === 'shaza' ? 'selected' : ''}>المفردة الشاذة</option>
                        <option value="irtibat" ${type === 'irtibat' ? 'selected' : ''}>الارتباط والاختلاف</option>
                    </select>
                    <i class="fas fa-times-circle remove-btn" onclick="removeQuestion(this)"></i>
                </div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="options-grid">${renderOptions(type, data)}</div>
                <div class="correct-ans-box">
                    <input type="text" placeholder="الإجابة النموذجية..." class="correct-input ans-val" value="${data ? (data.ans || '') : ''}" oninput="saveAll()">
                </div>
            `;
            container.appendChild(card);
            saveAll();
        }

        function renderQArea(type, data) {
            if (type === 'tanazor') {
                return `<div class="pair-row"><input type="text" placeholder="2" class="pair-word t2" value="${data ? data.text2 : ''}" oninput="saveAll()"><span style="color:red; font-weight:900; font-size:1.5rem">:</span><input type="text" placeholder="1" class="pair-word t1" value="${data ? data.text1 : ''}" oninput="saveAll()"></div>`;
            } else if (type === 'estieab') {
                return `<textarea class="estieab-box t-area" style="height:100px; width:100%; font-family:Cairo; resize:none;" placeholder="نص القطعة..." oninput="saveAll()">${data ? data.text_area : ''}</textarea><input type="text" placeholder="السؤال..." class="q-text-input q-main" value="${data ? data.text : ''}" oninput="saveAll()">`;
            } else {
                return `<input type="text" placeholder="اكتب السؤال هنا..." class="q-text-input q-main" value="${data ? data.text : ''}" oninput="saveAll()">`;
            }
        }

        function renderOptions(type, data) {
            let html = '';
            const labels = ['أ', 'ب', 'ج', 'د'];
            for (let i = 0; i < 4; i++) {
                if (type === 'tanazor') {
                    const v1 = data?.opt_pairs ? data.opt_pairs[i][0] : '';
                    const v2 = data?.opt_pairs ? data.opt_pairs[i][1] : '';
                    html += `<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word op2" value="${v2}" oninput="saveAll()"><span style="color:red; font-weight:900">:</span><input type="text" class="opt-word op1" value="${v1}" oninput="saveAll()"></div>`;
                } else {
                    const val = data?.opts ? data.opts[i] : '';
                    html += `<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word opt" style="margin-right:10px" value="${val}" oninput="saveAll()"></div>`;
                }
            }
            return html;
        }

        function toggleType(select) {
            const card = select.closest('.question-card');
            card.querySelector('.q-area').innerHTML = renderQArea(select.value, null);
            card.querySelector('.options-grid').innerHTML = renderOptions(select.value, null);
            saveAll();
        }

        function removeQuestion(btn) { btn.closest('.question-card').remove(); saveAll(); }

        function saveAll() {
            const questions = [];
            document.querySelectorAll('.question-card').forEach(card => {
                const type = card.querySelector('.type-select').value;
                const ans = card.querySelector('.ans-val').value;
                let qData = { type, ans };
                if (type === 'tanazor') {
                    qData.text1 = card.querySelector('.t1').value; qData.text2 = card.querySelector('.t2').value;
                    qData.opt_pairs = Array.from(card.querySelectorAll('.opt-pair-row')).map(row => [row.querySelector('.op1').value, row.querySelector('.op2').value]);
                } else {
                    qData.text = card.querySelector('.q-main')?.value || "";
                    if(type === 'estieab') qData.text_area = card.querySelector('.t-area').value;
                    qData.opts = Array.from(card.querySelectorAll('.opt-word.opt')).map(i => i.value);
                }
                questions.push(qData);
            });
            localStorage.setItem('fifi_v7_img', JSON.stringify(questions));
        }

        function loadQuestions() {
            const saved = localStorage.getItem('fifi_v7_img');
            if (saved) JSON.parse(saved).forEach(q => addQuestion(q));
        }

        function clearAll() { if(confirm("مسح الكل؟")) { localStorage.clear(); location.reload(); } }

        // وظيفة حفظ الصورة بدقة عالية جداً
        function saveAsImage() {
            const captureArea = document.createElement('div');
            captureArea.style.width = "850px";
            captureArea.style.padding = "20px";
            captureArea.style.background = "#f8fafc";
            
            captureArea.appendChild(document.getElementById('main-header').cloneNode(true));
            const content = document.getElementById('quiz-content').cloneNode(true);
            content.querySelectorAll('.remove-btn, .type-select').forEach(el => el.remove());
            captureArea.appendChild(content);

            document.body.appendChild(captureArea);
            captureArea.style.position = "absolute";
            captureArea.style.top = "-9999px";

            html2canvas(captureArea, {
                scale: 3, // دقة 3 أضعاف (High Quality)
                useCORS: true,
                backgroundColor: "#f8fafc"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `اختبار_الفيفي_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                document.body.removeChild(captureArea);
            });
        }

        function saveAsPDF() {
            const pdfContent = document.createElement('div');
            const cards = Array.from(document.querySelectorAll('.question-card'));
            for (let i = 0; i < cards.length; i += 3) {
                const page = document.createElement('div');
                page.style.width = "210mm"; page.style.height = "297mm";
                page.style.padding = "15mm"; page.style.boxSizing = "border-box";
                page.style.background = "white";
                page.appendChild(document.getElementById('main-header').cloneNode(true));
                for (let j = i; j < i + 3 && j < cards.length; j++) {
                    const clone = cards[j].cloneNode(true);
                    clone.querySelector('.type-select').remove();
                    clone.querySelector('.remove-btn').remove();
                    const textarea = clone.querySelector('textarea');
                    if(textarea) {
                        const div = document.createElement('div');
                        div.innerText = textarea.value;
                        div.className = "estieab-box";
                        div.style.height = "auto";
                        textarea.replaceWith(div);
                    }
                    page.appendChild(clone);
                }
                pdfContent.appendChild(page);
            }
            html2pdf().set({ margin: 0, filename: 'اختبار_الفيفي.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(pdfContent).save();
        }
    </script>
</body>
</html>
