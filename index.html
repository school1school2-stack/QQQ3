<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - الذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --royal-blue: #1e3a8a; --q-red: #ef4444; --bg-page: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 30px; box-sizing: border-box;
        }
        .header-right { text-align: right; } .header-left { text-align: left; }
        .user-name { margin: 0; color: var(--royal-blue); font-weight: 900; font-size: 1.5rem; }
        .school-name { margin: 0; color: #64748b; font-weight: 700; font-size: 1rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        .container { width: 100%; max-width: 850px; }
        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; }
        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }

        /* منطقة اللصق الذكي */
        .smart-paste-area { background: #f1f5f9; border: 2px dashed #3b82f6; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .smart-input { width: 100%; height: 80px; border: none; background: transparent; font-family: 'Cairo'; font-size: 1rem; resize: none; outline: none; text-align: right; }

        .q-number-badge { background: var(--royal-blue); color: white; padding: 2px 15px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; }
        .q-text-input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 12px; box-sizing: border-box; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: 900; color: #000; background: transparent; text-align: right; font-family: 'Cairo'; }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; gap: 8px; z-index: 1000; background: rgba(30, 41, 59, 0.95); padding: 12px 20px; border-radius: 50px; backdrop-filter: blur(10px); width: max-content; }
        .btn { border: none; padding: 8px 15px; border-radius: 30px; font-weight: 800; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; transition: 0.3s; font-family: 'Cairo'; font-size: 0.85rem; }
        
        body.student-mode .controls, body.student-mode .smart-paste-area, body.student-mode .remove-btn { display: none !important; }
    </style>
</head>
<body>

    <div class="user-header" id="main-header">
        <div class="header-right"><h2 class="user-name">أ. عبدالعزيز الفيفي</h2></div>
        <div class="header-center"><div class="logo-box"><i class="fas fa-award"></i></div></div>
        <div class="header-left"><p class="school-name">ثانوية الأمير عبدالمجيد 😉</p></div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div class="controls" id="admin-controls">
        <button class="btn" style="background:#3b82f6" onclick="addQuestion()"><i class="fas fa-magic"></i> إضافة سؤال ذكي</button>
        <button class="btn" style="background:#a855f7" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i> حفظ</button>
        <button class="btn" style="background:#4f46e5" onclick="loadFromCloud()"><i class="fas fa-cloud-download-alt"></i> فتح</button>
        <button class="btn" style="background:#06b6d4" onclick="generateStudentLink()"><i class="fas fa-link"></i> رابط الطلاب</button>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAVrIim7aXjg0hGrMk0qVrXT8geRIpHoBk",
            authDomain: "youy-apps.firebaseapp.com",
            databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
            projectId: "youy-apps",
            storageBucket: "youy-apps.firebasestorage.app",
            appId: "1:690543747528:web:10c85ef8c93b79596620fd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function addQuestion() {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            
            card.innerHTML = `
                <div class="smart-paste-area">
                    <textarea class="smart-input" placeholder="الصق السؤال مع الخيارات هنا (مثال: عاصمة السعودية؟ أ-الرياض ب-جدة...)" oninput="smartParse(this)"></textarea>
                </div>
                <div class="card-meta"><span class="q-number-badge"></span></div>
                <input type="text" class="q-text-input q-main" placeholder="السؤال يظهر هنا تلقائياً...">
                <div class="options-grid">
                    <div class="opt-pair-row"><span>أ</span><input type="text" class="opt-word opt-a"></div>
                    <div class="opt-pair-row"><span>ب</span><input type="text" class="opt-word opt-b"></div>
                    <div class="opt-pair-row"><span>ج</span><input type="text" class="opt-word opt-c"></div>
                    <div class="opt-pair-row"><span>د</span><input type="text" class="opt-word opt-d"></div>
                </div>
                <button class="remove-btn btn" style="background:#64748b; margin-top:10px" onclick="this.closest('.question-card').remove()">حذف</button>
            `;
            container.appendChild(card);
            updateNumbers();
        }

        // دالة الذكاء الاصطناعي لتحليل النص
        function smartParse(textarea) {
            const text = textarea.value;
            const card = textarea.closest('.question-card');
            
            // استخراج الخيارات بناءً على الحروف المشهورة
            const patterns = {
                a: /[أ-ا][\s\-\.\)]\s*(.*?)(?=\s*[ب-ج-د][\s\-\.\)]|$)/,
                b: /ب[\s\-\.\)]\s*(.*?)(?=\s*[ج-د][\s\-\.\)]|$)/,
                c: /ج[\s\-\.\)]\s*(.*?)(?=\s*د[\s\-\.\)]|$)/,
                d: /د[\s\-\.\)]\s*(.*)/
            };

            const questionMatch = text.split(/[أ-ب-ج-د][\s\-\.\)]/)[0];
            if(questionMatch) card.querySelector('.q-main').value = questionTextClean(questionMatch);

            Object.keys(patterns).forEach(key => {
                const match = text.match(patterns[key]);
                if(match) card.querySelector('.opt-' + key).value = match[1].trim();
            });
        }

        function questionTextClean(t) { return t.replace(/^\d+[\-\.\)]\s*/, '').trim(); }
        function updateNumbers() { document.querySelectorAll('.q-number-badge').forEach((b, i) => b.innerText = `سؤال ${i+1}`); }
        
        // دوال السحابة المعتادة (يمكنك إضافتها من النسخ السابقة لضمان الحفظ)
    </script>
</body>
</html>
